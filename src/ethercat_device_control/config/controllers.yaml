controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - straight_joint
      - front_wheel_joint
      - rear_wheel_joint
      - front_clamp_wheel_joint
      - rear_clamp_wheel_joint
    
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity
